interface:
  display_name: "New Chat Ready"
  short_description: "生成可续接的新对话交接包，并可从本地日志恢复丢失对话。"
  default_prompt: "Use $new-chat-ready to create a durable handoff document and a paste-ready prompt for continuing this task in a fresh chat. If current context is missing or stale, recover relevant state from local Codex or Claude Code logs before summarizing."
policy:
  allow_implicit_invocation: true
